databases:
  - name: collaborative-whiteboard-db
    plan: free
    databaseName: collaboard_db
    user: collaboard_user

services:
  - type: web
    name: collaborative-whiteboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: BACKEND_PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: collaborative-whiteboard-db
          property: connectionString
