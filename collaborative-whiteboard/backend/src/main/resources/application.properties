# ==========================================
# Collaborative Whiteboard - Spring Boot Config
# Uses environment variables for deployment.
# Falls back to local values for development.
# ==========================================

# Server Port (Render sets PORT automatically)
server.port=${PORT:8080}

# ==========================================
# Database Configuration
# Set these as Environment Variables on deployment:
#   DB_URL, DB_USERNAME, DB_PASSWORD
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/whiteboard_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:##Ha1Rs2Hu##}

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==========================================
# Application Name
# ==========================================
spring.application.name=collaborative-whiteboard
